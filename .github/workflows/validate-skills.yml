name: Validate Skills

on:
  push:
    branches: [main, master]
    paths:
      - 'skills/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check SKILL.md exists for each skill
        run: |
          echo "🔍 Checking SKILL.md files..."
          errors=0
          for dir in skills/*/; do
            skill_name=$(basename "$dir")
            if [[ ! -f "${dir}SKILL.md" ]]; then
              echo "❌ Missing SKILL.md in $skill_name"
              errors=$((errors + 1))
            else
              echo "✅ $skill_name has SKILL.md"
            fi
          done
          if [[ $errors -gt 0 ]]; then
            echo "::error::Found $errors skill(s) without SKILL.md"
            exit 1
          fi

      - name: Validate SKILL.md structure
        run: |
          echo "📋 Validating SKILL.md structure..."
          errors=0
          for skill_md in skills/*/SKILL.md; do
            skill_name=$(dirname "$skill_md" | xargs basename)

            # Check required sections
            if ! grep -q "^#" "$skill_md"; then
              echo "❌ $skill_name: Missing title (# header)"
              errors=$((errors + 1))
            fi

            if ! grep -qi "触发\|trigger" "$skill_md"; then
              echo "⚠️  $skill_name: Missing trigger section (optional)"
            fi

            echo "✅ $skill_name SKILL.md validated"
          done
          if [[ $errors -gt 0 ]]; then
            exit 1
          fi

      - name: Python syntax check
        run: |
          echo "🐍 Checking Python syntax..."
          errors=0
          for py_file in $(find skills -name "*.py" 2>/dev/null); do
            if python -m py_compile "$py_file" 2>&1; then
              echo "✅ $py_file"
            else
              echo "❌ $py_file has syntax errors"
              errors=$((errors + 1))
            fi
          done
          if [[ $errors -gt 0 ]]; then
            exit 1
          fi
          echo "No Python files found or all passed" || true

      - name: Summary
        run: |
          echo "## Skills Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Skill | SKILL.md | Python |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          for dir in skills/*/; do
            skill_name=$(basename "$dir")
            has_md="✅"
            has_py="—"
            [[ ! -f "${dir}SKILL.md" ]] && has_md="❌"
            [[ -n $(find "$dir" -name "*.py" 2>/dev/null) ]] && has_py="✅"
            echo "| $skill_name | $has_md | $has_py |" >> $GITHUB_STEP_SUMMARY
          done
